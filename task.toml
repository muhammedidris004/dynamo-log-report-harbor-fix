artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Requires correctly parsing an Apache-style log, aggregating request and client counts, and producing a precisely shaped JSON artifact."
solution_explanation = "Parse each non-empty log record, count distinct client IP addresses and request paths, then serialize the requested aggregate fields to /app/report.json."
verification_explanation = "Pytest validates the JSON schema and independently checks the total request count, distinct client count, and most-requested path from the supplied log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

